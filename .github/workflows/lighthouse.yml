# G8 — Lighthouse CI on every PR.
#
# Builds the frontend bundle, runs Lighthouse against the static dist/
# 3 times, asserts the perf budget from `frontend/lighthouserc.json`
# (LCP < 2 s, CLS < 0.10, TBT < 200 ms, perf score ≥ 0.85, a11y score
# ≥ 0.9). Result HTML reports get uploaded to LHCI's temporary public
# storage so the PR comment carries a clickable link.
#
# A deliberately bloated PR (e.g. import a 1 MB lib) fails this workflow
# with the specific budget that breached. The bundle-size budget is
# enforced separately in `.github/workflows/ci.yml` so two independent
# nets catch perf regressions.

name: Lighthouse

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Lighthouse CI
        working-directory: frontend
        # Pin the @lhci/cli version explicitly — `npx -p` resolves a
        # fresh tarball per run; pinning protects against upstream
        # behavioural drift on the SAME PR re-running months apart.
        run: |
          npx -p @lhci/cli@0.14.x lhci autorun \
            --collect.staticDistDir=./dist \
            --upload.target=temporary-public-storage \
            || exit 1
        env:
          # LHCI's temporary-public-storage requires no token — link is
          # in the workflow log + the autorun summary.
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
          LHCI_BUILD_CONTEXT__CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
