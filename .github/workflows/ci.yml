# F9.3 — CI workflow.
#
# Runs on every PR + every push to main:
#   - Backend pytest (≥ 100 tests).
#   - Frontend type-check + production build.
#   - Frontend bundle-size budget check.
#   - Backend secret-scan (F2.4).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend (no model extras for CI)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run pytest
        working-directory: backend
        run: |
          pytest -q
      - name: Secret scan (F2.4)
        working-directory: backend
        run: pytest tests/test_secret_scan.py -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type-check + build
        working-directory: frontend
        run: npm run build
      - name: Bundle-size budget
        working-directory: frontend
        run: |
          # F9.3 — fail the PR if the gzipped JS bundle creeps past 350 KB.
          # Vite reports gzip size in the build output; pull it out by
          # measuring the dist/assets/*.js file directly.
          actual_bytes=$(gzip -c dist/assets/*.js | wc -c | tr -d ' ')
          budget_bytes=358400  # 350 KB
          echo "Gzipped JS bundle: $actual_bytes bytes (budget $budget_bytes)"
          test "$actual_bytes" -le "$budget_bytes" || {
            echo "::error::Bundle exceeds 350 KB gzipped budget"
            exit 1
          }
