# F9.3 — CI workflow.
#
# Runs on every PR + every push to main:
#   - Backend pytest (≥ 100 tests).
#   - Frontend type-check + production build.
#   - Frontend bundle-size budget check.
#   - Backend secret-scan (F2.4).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend with [model,test] extras
        working-directory: backend
        # F4 — sub_classifier + acoustic_features import numpy at module
        # top, and verification.py imports speaker_encoder.py which
        # imports torch at module top. Those imports fire before pytest
        # even collects tests, so [model] is required for the suite to
        # load. The [test] extra brings pytest + httpx (the latter is
        # needed by fastapi.testclient — its absence breaks suite
        # collection at import time, NOT just at runtime). The [spoof]
        # extra (TTS) is left out — it doesn't resolve on the CI Python
        # version; XTTS-only tests are out of CI scope.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[model,test]"
      - name: Run pytest (fast suite, default)
        working-directory: backend
        # HF2 — `-m "not slow"` excludes the real-model integration tests.
        # The slow suite runs in the `backend-integration` job below
        # when model weights are available.
        run: |
          pytest -q -m "not slow"
      - name: Secret scan (F2.4)
        working-directory: backend
        run: pytest tests/test_secret_scan.py -q

  backend-integration:
    # HF2 — real-model end-to-end test. Requires the production
    # ReDimNet B5 + AASIST checkpoints under backend/models/. The job
    # auto-skips when weights aren't present (via pytest.skip).
    # Marked continue-on-error initially — flips to required once the
    # weights are reliably restored (release artefact + cache key).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend with [model,test] extras
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[model,test]"
      - name: Restore model weights cache
        # Operator uploads weights to a release artefact. Once the
        # release tag has the assets, swap this to actions/download-artifact.
        # Until then the cache miss is acceptable — pytest.skip handles it.
        uses: actions/cache@v4
        with:
          path: backend/models
          key: model-weights-v1.0
      - name: Install espeak-ng (system TTS for the test fixture)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends espeak-ng
      - name: Run slow integration tests
        working-directory: backend
        run: pytest -m slow -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type-check + build
        working-directory: frontend
        run: npm run build
      - name: Bundle-size budget
        working-directory: frontend
        run: |
          # HF6 — tightened from F9.3's loose 350 KB budget to 100 KB.
          # Current bundle ≈ 77 KB after HF1 (provenance type + banner +
          # transforms). The 23 KB headroom catches dependency-bloat
          # regressions early; bump if a real feature legitimately needs it.
          actual_bytes=$(gzip -c dist/assets/*.js | wc -c | tr -d ' ')
          budget_bytes=102400  # 100 KB
          echo "Gzipped JS bundle: $actual_bytes bytes (budget $budget_bytes)"
          test "$actual_bytes" -le "$budget_bytes" || {
            echo "::error::Bundle exceeds 100 KB gzipped budget (HF6)"
            exit 1
          }
      - name: Vitest unit tests
        working-directory: frontend
        # G7 — runs every src/lib/*.test.ts spec under happy-dom.
        # Unit-level coverage of the format helpers + the api wrapper's
        # cookie-auth contract.
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend (model + test)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[model,test]"
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Pin the cache key on the @playwright/test version so a
          # transitive bump invalidates correctly.
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium webkit firefox
      - name: Playwright E2E
        working-directory: frontend
        # G7 — webServer block in playwright.config.ts boots a fresh
        # uvicorn + vite preview before the suite runs.
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
