# F7.5 — single-host deployment for staging / pre-production.
#
# Three services:
#   backend   — the FastAPI app on :8000
#   frontend  — Vite-built static bundle served by nginx on :5173
#   nginx     — TLS termination + HSTS in front of backend (F7.7)
#
# Volumes:
#   biovoice-data   — SQLite database + reference samples + audit log
#   biovoice-models — ML weights (mounted read-only into the backend)
#
# Production: replace the single-host `nginx` block with the managed
# load balancer of the target cloud (ALB, Cloud Load Balancer, etc.) and
# bind that to /readyz for the health probe.

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
      args:
        INSTALL_EXTRAS: model
    image: biovoice-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # F7.4 — uvicorn must trust the proxy headers from nginx so
      # request.client.host is the real IP, not 127.0.0.1.
      FORWARDED_ALLOW_IPS: "*"
    volumes:
      - biovoice-data:/app/data
      - biovoice-models:/app/models:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  biovoice-data:
  biovoice-models:
