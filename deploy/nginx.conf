# F7.7 — production nginx config for the BioVoice kiosk.
#
# - TLS 1.2+ only, modern cipher suite (Mozilla "intermediate" profile).
# - HSTS header (includeSubDomains; preload) on every response.
# - Force every HTTP request to HTTPS.
# - Strip identifying headers, set X-Forwarded-* so the backend sees the
#   real client IP (FORWARDED_ALLOW_IPS=* in compose).
# - 10 MB body limit so the multipart audio uploads work but a malicious
#   client can't fill the disk.
#
# Replace the cert paths under /etc/nginx/certs with whatever your TLS
# pipeline provisions (Let's Encrypt, a managed cert from the cloud
# vendor, or the customer's PKI). Mount the directory read-only into
# this container.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json escape=json
        '{"ts":"$time_iso8601","method":"$request_method","path":"$uri","status":$status,'
        '"latency_ms":$request_time,"client_ip":"$remote_addr","ua":"$http_user_agent"}';
    access_log /dev/stdout json;
    error_log  /dev/stderr warn;

    # SSL settings — Mozilla "intermediate" 2024.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Rate limit at the edge as a defence-in-depth on top of F2.2 backend
    # rate limiting. 50 r/s per client IP across all routes; bursts of 100.
    limit_req_zone $binary_remote_addr zone=biovoice_general:10m rate=50r/s;

    # 10 MB body cap — multipart audio uploads (3-5 MB per WAV) plus headroom.
    client_max_body_size 10m;

    # 80 → 443 redirect.
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Main TLS-terminated kiosk.
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # F7.7 — HSTS. Only enable preload after you've held this header
        # for several months and tested every subdomain handles HTTPS.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP — kiosk is fully self-hosted; no inline JS aside from Vite's
        # dev-mode shim (Vite production builds emit no inline scripts).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; media-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

        limit_req zone=biovoice_general burst=100 nodelay;

        # Frontend (static SPA bundle).
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
        }

        # Backend (API).
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }

        # Health probes routed directly to the backend.
        location = /readyz {
            proxy_pass http://backend:8000/readyz;
        }
        location = /healthz {
            proxy_pass http://backend:8000/health;
        }
    }
}
