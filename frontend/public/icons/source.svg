<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a1422"/>
      <stop offset="60%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#04070d"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3da9fc"/>
      <stop offset="100%" stop-color="#7ef0ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Solid dark background fills the whole canvas (also defines the
       maskable safe area when the OS rounds the corners). -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200"
          fill="none" stroke="url(#wave)" stroke-width="3" opacity="0.35"/>
  <circle cx="256" cy="256" r="170"
          fill="none" stroke="url(#wave)" stroke-width="1.5" opacity="0.18"/>

  <!-- Voice waveform — five vertical bars, mid-height -->
  <g filter="url(#glow)" stroke="url(#wave)" stroke-linecap="round" stroke-width="22" fill="none">
    <line x1="166" y1="256" x2="166" y2="256"  stroke-opacity="0.7" stroke-dasharray="0 1"/>
    <line x1="166" y1="222" x2="166" y2="290"/>
    <line x1="206" y1="180" x2="206" y2="332"/>
    <line x1="246" y1="148" x2="246" y2="364"/>
    <line x1="286" y1="180" x2="286" y2="332"/>
    <line x1="326" y1="222" x2="326" y2="290"/>
  </g>
</svg>
